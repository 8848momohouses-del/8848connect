name: Production Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# Serialize deploys: concurrent runs (e.g. after an Actions outage flushes
# a queued backlog) collide on the server's git refs and corrupt them.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          
      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22022 -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts || true
          
      - name: Execute Deployment
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            cd /opt/8848-connect
            # self-heal refs corrupted by interrupted/concurrent fetches
            git update-ref -d refs/remotes/origin/main 2>/dev/null || true
            git fetch --prune origin
            git reset --hard origin/main
            cd deployment
            chmod +x scripts/*.sh
            ./scripts/deploy.sh
          EOF
