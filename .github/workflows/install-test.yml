name: install-test

on:
  push:
    branches: [main, staging, 'feature/8848-api-gateway', 'feature/8848-supply-chain']
  pull_request:

jobs:
  fresh-db-install:
    runs-on: ubuntu-latest
    container:
      image: odoo:19.0
      options: --user root
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Assert Odoo 19 environment
        run: |
          odoo --version | grep 'Odoo Server 19.0' || (echo "::error::Deployment mismatch: Expected Odoo 19" && exit 1)
      - name: Install all 8848 modules on an empty database and run baseline tests
        run: |
          odoo \
            --db_host=postgres --db_user=odoo --db_password=odoo \
            --addons-path=/usr/lib/python3/dist-packages/odoo/addons,$GITHUB_WORKSPACE/8848-connect-addons \
            -d ci_test \
            -i 8848_baseline_tests,8848_crm,8848_workflow,8848_communication,8848_api_gateway,8848_supplier,8848_factory,8848_warehouse,8848_delivery \
            --test-enable --test-tags 8848_api_gateway,8848_crm,8848_workflow,8848_communication,baseline_8848,security,portal,8848_supplier,8848_factory,8848_warehouse,8848_delivery \
            --stop-after-init \
            --log-level=warn
      - name: Fail on test errors in exit status
        run: echo "install + 15 baseline tests completed"
