name: Server Operations

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to run on the production server"
        required: true
        type: choice
        options:
          - inspect
          - diagnose
          - repair-config
          - recover-nginx
          - restore-content
          - harden
      release_tag:
        description: "Release tag holding backup assets (restore-content only)"
        required: false
        default: ""

jobs:
  server-op:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Inspect server (read-only)
        if: inputs.operation == 'inspect'
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            echo "== docker containers =="; docker ps --format '{{.Names}} {{.Image}} {{.Status}}'
            echo "== databases =="; docker exec 8848_db psql -U $(docker exec 8848_db printenv POSTGRES_USER) -lqt | cut -d'|' -f1 | grep -v template
            echo "== filestore dirs =="; docker exec 8848_odoo ls /var/lib/odoo/filestore/ 2>/dev/null || true
            echo "== odoo.conf (redacted) =="; docker exec 8848_odoo grep -vE "passwd|password" /etc/odoo/odoo.conf
            echo "== nginx sites =="; ls /etc/nginx/sites-enabled/ 2>/dev/null; nginx -T 2>/dev/null | grep -E "server_name|/web/database" | head -20
            echo "== disk =="; df -h / | tail -1
          EOF

      - name: Diagnose Odoo boot failure
        if: inputs.operation == 'diagnose'
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            cd /opt/8848-connect/deployment
            echo "== containers =="; docker ps -a --format '{{.Names}} {{.Status}}'
            echo "== odoo last 40 log lines =="; docker compose logs --tail 40 odoo 2>&1 | tail -40
            echo "== nginx sites-enabled =="; ls -la /etc/nginx/sites-enabled/ 2>/dev/null
            echo "== nginx sites-available =="; ls -la /etc/nginx/sites-available/ 2>/dev/null
            echo "== nginx listen/server_name/ssl in loaded config =="; sudo nginx -T 2>/dev/null | grep -nE "listen|server_name|ssl_certificate|location ~" | head -40
            echo "== .bak files left by edits =="; ls -la /etc/nginx/sites-enabled/*.bak* /etc/nginx/sites-available/*.bak* 2>/dev/null || echo "(none)"
            echo "== FULL odoo_http.conf =="; sudo cat /etc/nginx/sites-enabled/odoo_http.conf
            echo "== letsencrypt certs =="; sudo ls -la /etc/letsencrypt/live/ 2>/dev/null || echo "(no letsencrypt)"
            echo "== certbot certificates (domains + paths) =="; sudo certbot certificates 2>/dev/null | grep -E "Certificate Name|Domains|Certificate Path|Private Key Path|Expiry" || echo "(certbot not available)"
          EOF

      - name: Repair odoo.conf (de-duplicate keys) and reboot
        if: inputs.operation == 'repair-config'
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            cd /opt/8848-connect/deployment
            # The container crash-loops on the duplicate key, so edit the
            # HOST-side bind-mounted conf directly (mounted read-only into odoo).
            CONF=$(docker inspect 8848_odoo --format '{{range .Mounts}}{{if eq .Destination "/etc/odoo/odoo.conf"}}{{.Source}}{{end}}{{end}}')
            echo "conf on host: $CONF"
            echo "== before =="; sudo grep -nE "dbfilter|list_db" "$CONF" || true
            # keep only the FIRST occurrence of each key=; drop later duplicates
            sudo cp "$CONF" "$CONF.bak.$(date +%s)"
            sudo awk -F= '/^[[:space:]]*[A-Za-z_]+[[:space:]]*=/ {k=$1; gsub(/ /,"",k); if (seen[k]++) next} {print}' "$CONF" | sudo tee "$CONF.tmp" >/dev/null
            sudo mv "$CONF.tmp" "$CONF"
            echo "== after =="; sudo grep -nE "dbfilter|list_db" "$CONF" || true
            docker compose up -d
            sleep 18
            curl -s -o /dev/null -w "login: %{http_code}\n" http://127.0.0.1:8069/web/login
          EOF

      - name: Recover nginx (revert DB-manager insert, restart)
        if: inputs.operation == 'recover-nginx'
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set +e
            echo "== is nginx active? =="; sudo systemctl is-active nginx
            echo "== listening sockets :80/:443 =="; sudo ss -tlnp | grep -E ':80|:443' || echo "(nothing on 80/443)"
            echo "== remove the inserted DB-manager guard lines =="
            for f in /etc/nginx/sites-enabled/*; do
              sudo sed -i '/location ~ \^\/web\/database\/ { return 404; }/d' "$f"
              sudo sed -i '/location ~ \^\/web\/database\/ { deny all; }/d' "$f"
            done
            echo "== nginx config test =="; sudo nginx -t 2>&1
            echo "== force (re)start nginx =="; sudo systemctl start nginx 2>&1; sudo systemctl restart nginx 2>&1; sleep 3
            echo "== nginx journal (last 15 if still failing) =="; sudo systemctl is-active nginx | grep -q active || sudo journalctl -u nginx --no-pager 2>&1 | tail -15
            echo "== sockets after restart =="; sudo ss -tlnp | grep -E ':80|:443' || echo "(nothing on 80/443)"
            echo "== verify local :443 =="
            curl -sk -o /dev/null -w "erp login (local): %{http_code}\n" --resolve erp.8848mh.com:443:127.0.0.1 https://erp.8848mh.com/web/login
          EOF

      - name: Download backup assets from release
        if: inputs.operation == 'restore-content'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -n "${{ inputs.release_tag }}" || { echo "::error::release_tag required"; exit 1; }
          gh release download "${{ inputs.release_tag }}" --repo "$GITHUB_REPOSITORY" -D /tmp/transfer
          ls -lh /tmp/transfer

      - name: Transfer and restore content (with server-side safety backup)
        if: inputs.operation == 'restore-content'
        run: |
          scp -P 22022 -o StrictHostKeyChecking=no /tmp/transfer/db.dump /tmp/transfer/filestore.tar.gz \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }}:/tmp/
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            cd /opt/8848-connect/deployment
            DBUSER=$(docker exec 8848_db printenv POSTGRES_USER)
            STAMP=$(date +%Y%m%d-%H%M%S)

            echo "== 1/6 server-side safety backup of current live DB =="
            mkdir -p /opt/8848-connect/server-backups/$STAMP
            docker exec 8848_db pg_dump -U "$DBUSER" -Fc 8848_live_final > /opt/8848-connect/server-backups/$STAMP/pre-restore-db.dump || echo "(live DB absent, nothing to back up)"
            docker exec 8848_odoo tar -czf - -C /var/lib/odoo/filestore 8848_live_final 2>/dev/null > /opt/8848-connect/server-backups/$STAMP/pre-restore-filestore.tar.gz || true

            echo "== 2/6 stop odoo =="
            docker compose stop odoo

            echo "== 3/6 replace database =="
            docker exec 8848_db psql -U "$DBUSER" -d postgres -c "DROP DATABASE IF EXISTS \"8848_live_final\";"
            docker exec 8848_db psql -U "$DBUSER" -d postgres -c "CREATE DATABASE \"8848_live_final\";"
            docker exec -i 8848_db pg_restore -U "$DBUSER" --no-owner -d 8848_live_final < /tmp/db.dump

            echo "== 4/6 replace filestore (renamed to live DB name) =="
            docker run --rm -v deployment_odoo-filestore:/fs -v /tmp:/t alpine sh -c \
              "rm -rf /fs/filestore/8848_live_final && mkdir -p /fs/filestore && tar -xzf /t/filestore.tar.gz -C /tmp_x 2>/dev/null || (mkdir -p /tmp_x && tar -xzf /t/filestore.tar.gz -C /tmp_x) && mv /tmp_x/* /fs/filestore/8848_live_final"

            echo "== 5/6 align schema with deployed code =="
            docker compose run --rm odoo odoo -c /etc/odoo/odoo.conf -d 8848_live_final -u 8848_franchise,8848_communication,8848_portal,8848_warehouse,8848_supplier,8848_factory,8848_quality --stop-after-init --logfile=/dev/stdout | tail -20

            echo "== 6/6 start and verify =="
            docker compose up -d
            sleep 15
            curl -s -o /dev/null -w "login: %{http_code}\n" http://127.0.0.1:8069/web/login
            rm -f /tmp/db.dump /tmp/filestore.tar.gz
            echo "RESTORE COMPLETE (safety backup: server-backups/$STAMP)"
          EOF

      - name: Harden database manager exposure
        if: inputs.operation == 'harden'
        run: |
          ssh -p 22022 -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            set -e
            cd /opt/8848-connect/deployment
            # odoo.conf is bind-mounted read-only and already carries
            # list_db=False + dbfilter (verified via repair-config); the
            # database manager is locked at the reverse proxy here.
            echo "== current conf policy (host file) =="
            CONF=$(docker inspect 8848_odoo --format '{{range .Mounts}}{{if eq .Destination "/etc/odoo/odoo.conf"}}{{.Source}}{{end}}{{end}}')
            sudo grep -nE "list_db|dbfilter" "$CONF" || true
            echo "== block /web/database/* at nginx on every vhost =="
            for f in /etc/nginx/sites-enabled/*; do
              if ! grep -q "web/database" "$f"; then
                sudo sed -i '0,/location \/ {/s//location ~ ^\/web\/database\/ { return 404; }\n    location \/ {/' "$f"
                echo "  patched $f"
              else
                echo "  already blocked: $f"
              fi
            done
            sudo nginx -t && sudo systemctl reload nginx
            sleep 3
            echo "== verify (via nginx :443, the real entrypoint) =="
            curl -sk -o /dev/null -w "db selector: %{http_code} (expect 404)\n" https://erp.8848mh.com/web/database/selector || true
            curl -sk -o /dev/null -w "login: %{http_code}\n" https://erp.8848mh.com/web/login
          EOF
