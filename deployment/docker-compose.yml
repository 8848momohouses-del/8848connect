# 8848 Business Suite — staging/production stack (Milestone 0 template)
# Approved blueprint: Docker Compose on Ubuntu LTS VPS, nginx on the host.
# Copy .env.example to .env and fill secrets before `docker compose up -d`.
# NOT used for local development (local stays native per Milestone 0 scope).

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:${ODOO_IMAGE_TAG:-19}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${DB_USER}
      PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:8069:8069"   # backend/portal (nginx proxies)
      - "127.0.0.1:8072:8072"   # websocket / longpolling (nginx /websocket)
    volumes:
      - odoo-filestore:/var/lib/odoo
      - ../8848-connect-addons:/mnt/extra-addons:ro
      - ./odoo.conf.rendered:/etc/odoo/odoo.conf:ro
      - odoo-logs:/var/log/odoo

volumes:
  pgdata:
  odoo-filestore:
  odoo-logs:
