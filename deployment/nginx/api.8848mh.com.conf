# api.8848mh.com — integration API (Deliverable 5 / Deliverable 2)
# ONLY /api/v1/* is exposed; every other path 404s. Edge rate limiting here,
# application-level per-key limits inside 8848_api_gateway (future step 6).
limit_req_zone $binary_remote_addr zone=api8848:10m rate=10r/s;

upstream odoo_api { server 127.0.0.1:8069; }

server {
    listen 443 ssl http2;
    server_name api.8848mh.com;

    ssl_certificate     /etc/letsencrypt/live/api.8848mh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.8848mh.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 2M;

    location /api/v1/ {
        limit_req zone=api8848 burst=20 nodelay;
        proxy_pass http://odoo_api;
        proxy_redirect off;
    }
    location / { return 404; }
}

server {
    listen 80;
    server_name api.8848mh.com;
    return 301 https://$host$request_uri;
}
