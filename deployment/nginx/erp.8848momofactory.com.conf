# erp.8848momofactory.com — staff backend (Deliverable 5)
# Full Odoo backend. Restrict by IP allowlist (or VPN) before go-live.
upstream odoo { server 127.0.0.1:8069; }
upstream odoo_ws { server 127.0.0.1:8072; }

server {
    listen 443 ssl http2;
    server_name erp.8848momofactory.com 8848momofactory.com;

    ssl_certificate     /etc/letsencrypt/live/erp.8848momofactory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.8848momofactory.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # --- backend access restriction: fill in office/home IPs before go-live ---
    # allow 203.0.113.10;   # office
    # deny all;

    # --- database manager: never exposed, even to allowed IPs ---
    location ~ ^/web/database/ { deny all; }

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 64M;

    location /websocket {
        proxy_pass http://odoo_ws;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
    location / { proxy_pass http://odoo; proxy_redirect off; }
}

server {
    listen 80;
    server_name erp.8848momofactory.com 8848momofactory.com;
    return 301 https://$host$request_uri;
}
