# 8848 Business Suite — production nginx (HTTP->HTTPS + TLS reverse proxy)
# Single SAN cert /etc/letsencrypt/live/erp.8848mh.com covers
# erp / portal / api .8848mh.com. Installed by server-ops enable-https.

upstream odoo      { server 127.0.0.1:8069; }
upstream odoo-chat { server 127.0.0.1:8072; }

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name erp.8848mh.com portal.8848mh.com api.8848mh.com 8848mh.com _;
    return 301 https://$host$request_uri;
}

# Apex domain: no service of its own — redirect to the ERP backend.
# Uses the erp.8848mh.com-0001 cert, which is the one that covers 8848mh.com
# (the primary erp cert below covers erp/portal/api but NOT the bare apex).
server {
    listen 443 ssl http2;
    server_name 8848mh.com;

    ssl_certificate     /etc/letsencrypt/live/erp.8848mh.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.8848mh.com-0001/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    return 301 https://erp.8848mh.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.8848mh.com portal.8848mh.com api.8848mh.com;

    ssl_certificate     /etc/letsencrypt/live/erp.8848mh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.8848mh.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 500M;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    # Database manager must never be reachable in production
    location ~ ^/web/database/ { return 404; }

    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    location /websocket {
        proxy_pass http://odoo-chat;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    location / {
        proxy_redirect off;
        proxy_pass http://odoo;
    }

    gzip on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
}
