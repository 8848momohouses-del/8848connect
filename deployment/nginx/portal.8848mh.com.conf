# portal.8848mh.com — public franchise portal (Deliverable 5)
# Public: login-gated by Odoo itself. Backend paths and DB manager blocked.
upstream odoo_portal { server 127.0.0.1:8069; }
upstream odoo_portal_ws { server 127.0.0.1:8072; }

server {
    listen 443 ssl http2;
    server_name portal.8848mh.com;

    ssl_certificate     /etc/letsencrypt/live/portal.8848mh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.8848mh.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location ~ ^/web/database/ { deny all; }
    # Block the backend web client on the portal hostname
    location ~ ^/odoo(/|$) { return 404; }

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 32M;

    location /websocket {
        proxy_pass http://odoo_portal_ws;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
    location / { proxy_pass http://odoo_portal; proxy_redirect off; }
}

server {
    listen 80;
    server_name portal.8848mh.com;
    return 301 https://$host$request_uri;
}
